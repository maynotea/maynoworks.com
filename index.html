<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maynoworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600&family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #f7f6f3;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 56px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      padding: 40px 0;
    }
    .top {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }
    .fields {
      font-family: 'Karla', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.02em;
    }
    .fields span {
      margin: 0 4px;
      color: #999;
    }
    .url {
      font-family: 'Karla', sans-serif;
      font-size: 13px;
      color: #555;
      letter-spacing: 0.06em;
    }
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
    }
    .photo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-wrap img {
      max-width: 320px;
      width: 100%;
      height: auto;
      border-radius: 2px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .tag {
      font-family: 'Karla', sans-serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 28px;
    }
    .copy {
      font-family: 'Karla', sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: #555;
      line-height: 2;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }
    .status {
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #2a2a2a;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    .soon {
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #2a2a2a;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
    }
    .contact {
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #2e7d4f;
      letter-spacing: 0.02em;
      margin-top: 4px;
    }
    .bottom {
      border-top: 0.5px solid #d8d7d2;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
    }
    .small {
      font-family: 'Karla', sans-serif;
      font-size: 12px;
      color: #777;
      letter-spacing: 0.04em;
    }
    @media (max-width: 700px) {
      .wrap { padding: 36px 28px; }
      .main { flex: 1; flex-direction: column-reverse; align-items: flex-start; justify-content: center; gap: 32px; padding: 0; }
      .photo-wrap { align-self: flex-start; }
      .photo-wrap img { max-width: 220px; }
      .copy { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">MAYNOWORKS</div>
      <p class="fields">Art Therapy <span>·</span> Publishing <span>·</span> Workshops</p>
    </div>

    <div class="main">
      <div class="center">
        <p class="status">Website is currently in progress.</p>
        <p class="soon">Stay tuned.</p>
        <p class="contact">Contact : maynoworks@gmail.com</p>
        <p class="contact">Instagram : @maynoworks</p>
      </div>
      <div class="photo-wrap">
        <img src="photo.jpg" alt="maynoworks">
      </div>
    </div>

    <div class="bottom">
      <span class="small">©2026 maynoworks</span>
    </div>
  </div>
</body>
</html>
