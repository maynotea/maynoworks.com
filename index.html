<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maynoworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #f7f6f3;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 56px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }
    .url {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.06em;
    }
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 0 60px;
    }
    .tag {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #999;
      margin-bottom: 28px;
    }
    .copy {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: #555;
      line-height: 2;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }
    .status {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .soon {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: #777;
      letter-spacing: 0.1em;
      margin-bottom: 36px;
    }
    .fields {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.1em;
    }
    .fields span {
      margin: 0 6px;
      color: #ccc;
    }
    .bottom {
      border-top: 0.5px solid #d8d7d2;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
    }
    .small {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.05em;
    }
    @media (max-width: 600px) {
      .wrap { padding: 36px 28px; }
      .copy { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">maynoworks</div>
      <div class="url">maynoworks.com</div>
    </div>

    <div class="center">
      <p class="tag">— COMING SOON</p>
      <p class="status">Website is currently in progress.</p>
      <p class="soon">See you soon.</p>
      <p class="fields">Art Therapy <span>·</span> Publishing <span>·</span> Workshops</p>
    </div>

    <div class="bottom">
      <span class="small">© 2025 Maynoworks</span>
      <span class="small">All rights reserved</span>
    </div>
  </div>
</body>
</html>
