<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publishing — Maynoworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600&family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #f7f6f3;
      font-family: 'Karla', sans-serif;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 56px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .top {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 80px;
    }
    .back {
      font-size: 12px;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back:hover { color: #444; }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }
    .main {
      flex: 1;
    }
    .label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #999;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 0.01em;
    }
    .body-text {
      font-size: 16px;
      font-weight: 500;
      color: #2a2a2a;
      line-height: 1.9;
      letter-spacing: 0.01em;
      margin-bottom: 56px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 28px;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #e9e7e1;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }
    .card-cover span {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 0.04em;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #2a2a2a;
      letter-spacing: 0.02em;
    }
    .bottom {
      border-top: 0.5px solid #d8d7d2;
      padding-top: 24px;
      margin-top: 60px;
      display: flex;
      justify-content: space-between;
    }
    .small {
      font-size: 12px;
      color: #777;
      letter-spacing: 0.04em;
    }
    @media (max-width: 700px) {
      .wrap { padding: 36px 28px; }
      .top { margin-bottom: 56px; }
      h1 { font-size: 24px; }
      .body-text { font-size: 15px; }
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html">← maynoworks</a>
      <div class="logo">MAYNOWORKS</div>
    </div>

    <div class="main">
      <p class="label">Publishing</p>
      <h1>고월</h1>
      <p class="body-text">메이노웍스에서 펴내는 포토에세이 시리즈, 고월(음력 오월)입니다.<br>매 호마다 짧은 주제를 담아 독립출판으로 발행합니다.</p>

      <div class="gallery">
        <div class="card">
          <div class="card-cover"><span>준비 중</span></div>
          <div class="card-title">고월 vol.1</div>
        </div>
        <div class="card">
          <div class="card-cover"><span>준비 중</span></div>
          <div class="card-title">고월 vol.2</div>
        </div>
        <div class="card">
          <div class="card-cover"><span>준비 중</span></div>
          <div class="card-title">고월 vol.3</div>
        </div>
        <div class="card">
          <div class="card-cover"><span>준비 중</span></div>
          <div class="card-title">고월 vol.4</div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <span class="small">©2026 maynoworks</span>
    </div>
  </div>
</body>
</html>
