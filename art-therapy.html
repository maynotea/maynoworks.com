<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Therapy — Maynoworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600&family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #f7f6f3;
      font-family: 'Karla', sans-serif;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 56px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .top {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 80px;
    }
    .back {
      font-size: 12px;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back:hover { color: #444; }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }
    .main {
      flex: 1;
    }
    .label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #999;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }
    .body-text {
      font-size: 16px;
      font-weight: 500;
      color: #2a2a2a;
      line-height: 1.9;
      letter-spacing: 0.01em;
      margin-bottom: 28px;
    }
    .tags {
      font-size: 14px;
      font-weight: 600;
      color: #2e7d4f;
      letter-spacing: 0.02em;
      margin-top: 16px;
    }
    .bottom {
      border-top: 0.5px solid #d8d7d2;
      padding-top: 24px;
      margin-top: 60px;
      display: flex;
      justify-content: space-between;
    }
    .small {
      font-size: 12px;
      color: #777;
      letter-spacing: 0.04em;
    }
    @media (max-width: 700px) {
      .wrap { padding: 36px 28px; }
      .top { margin-bottom: 56px; }
      h1 { font-size: 24px; }
      .body-text { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html">← maynoworks</a>
      <div class="logo">MAYNOWORKS</div>
    </div>

    <div class="main">
      <p class="label">Art Therapy</p>
      <h1>그림 한 장에 담기는 마음이 있습니다.</h1>
      <p class="body-text">말로는 다 꺼내지 못한 이야기를, 색과 선으로 표현합니다.</p>
      <p class="tags">개인 미술치료 · 집단 미술치료</p>
    </div>

    <div class="bottom">
      <span class="small">©2026 maynoworks</span>
    </div>
  </div>
</body>
</html>
